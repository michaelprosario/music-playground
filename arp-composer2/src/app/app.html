<div class="app-shell">
  <header class="app-header">
    <h1>Rhythm Pattern Player</h1>
    <p class="subtitle">Define a pattern with <code>*</code> (note) and <code>-</code> (rest), configure your sound, and hit Play.</p>
  </header>

  @if (midiState().error && !midiState().usingFallback) {
    <div class="midi-error-banner">
      <strong>MIDI:</strong> {{ midiState().error }}
    </div>
  }

  <main class="layout">
    <div class="left-column">
      <app-pattern-input />
      <app-playback-controls />
    </div>
    <div class="right-column">
      <app-config-panel />
    </div>
  </main>
</div>
