<section class="pattern-input">
  <h2>Rhythm Pattern</h2>

  <div class="legend">
    <span><code>*</code> = note &nbsp;|&nbsp; <code>-</code> = rest</span>
  </div>

  <div class="input-row">
    <input
      class="pattern-text"
      type="text"
      [ngModel]="patternString()"
      (ngModelChange)="onPatternChange($event)"
      placeholder="e.g. *---*---*---*---"
      spellcheck="false"
      autocomplete="off"
    />
    <span class="length-badge">{{ patternString().length }} steps</span>
  </div>

  @if (validation().error) {
    <p class="msg error">{{ validation().error }}</p>
  }
  @if (validation().warning) {
    <p class="msg warning">{{ validation().warning }}</p>
  }

  <div class="grid">
    @for (step of steps(); track step.index) {
      <div
        class="cell"
        [class.note]="step.isNote"
        [class.rest]="!step.isNote"
        [class.active]="isActiveStep(step.index)"
      >
        {{ step.char }}
      </div>
    }
  </div>

  <div class="presets">
    <span class="presets-label">Presets:</span>
    <button (click)="onPatternChange('*---*---*---*---')">Quarter notes</button>
    <button (click)="onPatternChange('*-*-*-*-*-*-*-*-')">Eighth notes</button>
    <button (click)="onPatternChange('****************')">Sixteenth notes</button>
    <button (click)="onPatternChange('*--*--*--*--*--*')">Dotted eighth</button>
    <button (click)="onPatternChange('*---*-*-*---*-*-')">Syncopated</button>
  </div>
</section>
