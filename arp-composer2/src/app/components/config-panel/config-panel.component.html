<section class="config-panel">
  <h2>Configuration</h2>

  <div class="fields">

    <!-- Tempo -->
    <div class="field">
      <label>Tempo<span class="value-badge">{{ bpm }} BPM</span></label>
      <div class="slider-row">
        <span class="range-min">20</span>
        <input
          type="range"
          min="20" max="300" step="1"
          [(ngModel)]="bpm"
        />
        <span class="range-max">300</span>
      </div>
    </div>

    <!-- Beats per measure -->
    <div class="field">
      <label>Beats per Measure</label>
      <div class="btn-group">
        @for (b of beatsOptions; track b) {
          <button
            [class.active]="beatsPerMeasure === b"
            (click)="beatsPerMeasure = b"
          >{{ b }}</button>
        }
      </div>
    </div>

    <!-- Pitch -->
    <div class="field">
      <label>Pitch</label>
      <select [(ngModel)]="midiNote">
        @for (opt of noteOptions; track opt.value) {
          <option [ngValue]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <!-- MIDI Channel -->
    <div class="field">
      <label>MIDI Channel<span class="value-badge">Ch {{ midiChannel }}</span></label>
      <div class="slider-row">
        <span class="range-min">1</span>
        <input
          type="range"
          min="1" max="16" step="1"
          [(ngModel)]="midiChannel"
        />
        <span class="range-max">16</span>
      </div>
    </div>

    <!-- Note Duration -->
    <div class="field">
      <label>Note Length<span class="value-badge">{{ (noteDurationRatio * 100) | number:'1.0-0' }}%</span></label>
      <div class="slider-row">
        <span class="range-min">10%</span>
        <input
          type="range"
          min="0.1" max="0.95" step="0.01"
          [(ngModel)]="noteDurationRatio"
        />
        <span class="range-max">95%</span>
      </div>
    </div>

    <!-- MIDI Output -->
    @if (!midiState().usingFallback && midiState().outputs.length > 0) {
      <div class="field">
        <label>MIDI Output</label>
        <select
          [ngModel]="midiState().selectedOutputId"
          (ngModelChange)="onOutputChange($event)"
        >
          @for (out of midiState().outputs; track out.id) {
            <option [ngValue]="out.id">{{ out.name }}</option>
          }
        </select>
      </div>
    }

    @if (midiState().usingFallback) {
      <div class="fallback-notice">
        <span class="icon">🔈</span>
        Web Audio fallback active — no MIDI hardware required.
      </div>
    }
  </div>
</section>
